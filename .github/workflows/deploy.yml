name: Deploy to AWS

# Builds the Docker image, pushes it to Amazon ECR, and rolls it out on App Runner.
# Uses GitHub OIDC to assume an AWS role — no long-lived keys in GitHub secrets.
#
# Required repo configuration:
#   Variables: AWS_REGION, ECR_REPOSITORY, APP_RUNNER_SERVICE_ARN
#   Secrets:   AWS_DEPLOY_ROLE_ARN   (IAM role trusting GitHub OIDC)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write # for OIDC
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          REPOSITORY: ${{ vars.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t "$REGISTRY/$REPOSITORY:$IMAGE_TAG" -t "$REGISTRY/$REPOSITORY:latest" .
          docker push "$REGISTRY/$REPOSITORY:$IMAGE_TAG"
          docker push "$REGISTRY/$REPOSITORY:latest"

      - name: Trigger App Runner deployment
        run: |
          aws apprunner start-deployment --service-arn "${{ vars.APP_RUNNER_SERVICE_ARN }}"
